name: defang-gcp
runtime: yaml
description: Example using defang-gcp to deploy services to GCP (Pulumi YAML)

plugins:
  providers:
    - name: defang-gcp
      path: ../../bin

resources:
  gcp-demo:
    type: defang-gcp:index:Project
    properties:
      services:
        app:
          image: nginx
          ports:
            - target: 80
              mode: ingress
              appProtocol: http

outputs:
  endpoints: ${gcp-demo.endpoints}
