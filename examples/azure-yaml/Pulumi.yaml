name: defang-azure
runtime: yaml
description: Example using defang-azure to deploy services to Azure

plugins:
  providers:
    - name: defang-azure
      path: ../../bin

resources:
  azure-demo:
    type: defang-azure:index:Project
    properties:
      services:
        app:
          image: nginx
          ports:
            - target: 80
              mode: ingress
              appProtocol: http

outputs:
  endpoints: ${azure-demo.endpoints}
