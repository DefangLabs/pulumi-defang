name: Setup and Build SDK
description: Installs Go, pulumictl, Pulumi CLI, and the language-specific toolchain, then builds the SDK.

inputs:
  language:
    description: SDK language to set up (nodejs, python, dotnet, go)
    required: true
  provider:
    description: Provider to build the SDK for (e.g. defang-aws, defang-gcp, defang-azure)
    required: true

runs:
  using: composite
  steps:
    - name: Unshallow clone for tags
      shell: bash
      run: git fetch --prune --unshallow --tags

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum

    - name: Install pulumictl
      shell: bash
      run: |
        gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
        tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Install Pulumi CLI
      uses: pulumi/actions@v6

    - if: ${{ inputs.language == 'nodejs' }}
      name: Setup Node
      uses: actions/setup-node@v6
      with:
        # Node 24 ships with npm 11, which supports OIDC Trusted Publishers natively.
        # We upgraded from Node 22 because the Node 22.22.2 tool cache on the ubuntu-24.04
        # runner image ships with a broken npm 10.9.7 (promise-retry missing from its module
        # tree), which causes `npm install -g` to fail. Node 24 avoids this entirely.
        # See: https://github.com/actions/runner-images/issues/13883
        #      https://github.com/nodejs/node/pull/62463
        node-version: 24.x
        registry-url: https://registry.npmjs.org

    - if: ${{ inputs.language == 'dotnet' }}
      name: Setup DotNet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - if: ${{ inputs.language == 'python' }}
      name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.9"

    - name: Build SDK
      shell: bash
      run: make ${{ inputs.language }}_sdk_${{ inputs.provider }}
