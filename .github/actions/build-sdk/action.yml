name: Setup and Build SDK
description: Installs Go, pulumictl, Pulumi CLI, and the language-specific toolchain, then builds the SDK.

inputs:
  language:
    description: SDK language to set up (nodejs, python, dotnet, go)
    required: true
  provider:
    description: Provider to build the SDK for (e.g. defang-aws, defang-gcp, defang-azure)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Go build environment
      uses: ./.github/actions/setup-go

    - name: Install Pulumi CLI
      uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

    - if: ${{ inputs.language == 'nodejs' }}
      name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        # Node 24 ships with npm 11, which supports OIDC Trusted Publishers natively.
        # We upgraded from Node 22 because the Node 22.22.2 tool cache on the ubuntu-24.04
        # runner image ships with a broken npm 10.9.7 (promise-retry missing from its module
        # tree), which causes `npm install -g` to fail. Node 24 avoids this entirely.
        # See: https://github.com/actions/runner-images/issues/13883
        #      https://github.com/nodejs/node/pull/62463
        node-version: 24.x # should match the version in shell.nix
        registry-url: https://registry.npmjs.org

    - if: ${{ inputs.language == 'dotnet' }}
      name: Setup DotNet
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: 8.0.x # should match the version in shell.nix

    - if: ${{ inputs.language == 'python' }}
      name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.12" # should match the version in shell.nix

    - if: ${{ inputs.language == 'python' }}
      name: Install Python build dependencies
      shell: bash
      run: pip install setuptools

    - name: Build SDK
      shell: bash
      run: make ${{ inputs.language }}_sdk_${{ inputs.provider }}
