name: release
on:
  push:
    tags:
      - "v*.*.*"
      # - '!*.*.*-**'

permissions:
  contents: write # Allows writing releases
  packages: write # Allows publishing packages
  id-token: write # Required for requesting the JWT before publishing to Pypi and NPM
  pull-requests: write # Allows creating PRs for regenerated examples

env:
  PROVIDER: "defang"
  # THIS GITHUB_TOKEN IS A REQUIREMENT TO BE ABLE TO WRITE TO GH RELEASES
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # IF YOU NEED TO PUBLISH A NPM PACKAGE THEN ENSURE PUBLISH_NPM: TRUE.
  # IF YOU WANT TO PUBLISH TO A PRIVATE NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  # Authentication is handled via npm Trusted Publishers (no token required).
  PUBLISH_NPM: true
  NPM_REGISTRY_URL: https://registry.npmjs.org
  # IF YOU NEED TO PUBLISH A NUGET PACKAGE THEN ENSURE AN NUGET_PUBLISH_KEY
  # SECRET IS SET AND PUBLISH_NUGET: TRUE. IF YOU WANT TO PUBLISH TO AN ALTERNATIVE
  # NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  NUGET_PUBLISH_KEY: ${{ secrets.NUGET_PUBLISH_KEY }}
  NUGET_FEED_URL: https://api.nuget.org/v3/index.json
  PUBLISH_NUGET: true
  # IF YOU NEED TO PUBLISH A PYPI PACKAGE THEN ENSURE PUBLISH_PYPI: TRUE.
  # Authentication is handled via PyPI Trusted Publishers (no token required).
  PUBLISH_PYPI: true
  # GitHub Container Registry (GHCR); note: must be lowercased first
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/cd
  # Defang public registry (from AWS SharedServices account)
  AWS_REPO: public.ecr.aws/defang-io/cd
  # Defang public registry (from Azure SharedServices account)
  AZURE_REPO: defang.azurecr.io/cd
  # Defang public registry (from GCP SharedServices account)
  GCP_REPO: us-central1-docker.pkg.dev/defang-io/public/cd

jobs:
  publish_binary:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      # Backstop for the test.yml `regen` auto-commit: refuse to release if the
      # committed schema or Go SDK don't match what the current source generates.
      - name: Verify generated artifacts are up to date
        run: |
          make schema go_sdk
          git update-index -q --refresh
          if ! git diff-index --quiet HEAD -- 'provider/cmd/pulumi-resource-defang-*/schema.json' sdk/v2/; then
            >&2 echo "error: committed schema.json or Go SDK is out of date relative to source."
            git diff --stat -- 'provider/cmd/pulumi-resource-defang-*/schema.json' sdk/v2/
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser # either 'goreleaser' (default) or 'goreleaser-pro'
          args: -p 2 release
          version: v2

  publish_sdk:
    name: Publish SDKs
    runs-on: ubuntu-latest
    needs: publish_binary
    environment: publish
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup and build SDK
        uses: ./.github/actions/build-sdk
        with:
          language: ${{ matrix.language }}
          provider: defang-${{ matrix.provider }}

      - name: Compress SDK folder
        run: tar -zcf sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz -C sdk/${{ matrix.language }}/defang-${{ matrix.provider }} .
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.language }}-${{ matrix.provider }}-sdk.tar.gz
          path: ${{ github.workspace}}/sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz
      - if: ${{ matrix.language == 'python' && env.PUBLISH_PYPI == 'true' }}
        name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{github.workspace}}/sdk/python/defang-${{ matrix.provider }}/bin/dist
      - if: ${{ matrix.language == 'nodejs' && env.PUBLISH_NPM == 'true' }}
        name: Publish package to npm
        run: |
          DIST_TAG=$(node -e "const v=require('./package.json').version;const m=v.match(/-([a-zA-Z]+)/);process.stdout.write(m?m[1]:'latest')")
          npm publish --access public --tag "$DIST_TAG"
        working-directory: ${{github.workspace}}/sdk/nodejs/defang-${{ matrix.provider }}/bin
      - if: ${{ matrix.language == 'dotnet' && env.PUBLISH_NUGET == 'true' }}
        name: publish nuget package
        run: |
          dotnet nuget push ${{github.workspace}}/sdk/dotnet/defang-${{ matrix.provider }}/bin/Debug/*.nupkg -s ${{ env.NUGET_FEED_URL }} -k ${{ env.NUGET_PUBLISH_KEY }}
          echo "done publishing packages"
    strategy:
      fail-fast: false
      matrix:
        language:
          - nodejs
          - python
          - dotnet
        provider:
          - aws
          - gcp
          - azure

  regenerate_examples:
    name: Regenerate Examples
    runs-on: ubuntu-latest
    needs: publish_binary
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - name: Regenerate examples
        run: make examples
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit and push updated examples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/
          if git diff --cached --quiet; then
            echo "No example changes to commit"
          else
            BRANCH="chore/regenerate-examples-${{ github.ref_name }}"
            git checkout -b "$BRANCH"
            git commit -m "chore: regenerate examples for ${{ github.ref_name }}"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: regenerate examples for ${{ github.ref_name }}" \
              --body "Automated regeneration of examples triggered by release ${{ github.ref_name }}." \
              --base main \
              --head "$BRANCH"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  publish_images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: publish_binary
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        clouds: [aws, gcp, azure] # skip 'all' because we only ever deploy cloud X to X
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: matrix.clouds == 'aws' || matrix.clouds == 'all'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # ECR Public is always us-east-1

      - name: Log in to Amazon ECR Public
        if: matrix.clouds == 'aws' || matrix.clouds == 'all'
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        with:
          registry-type: public

      - name: Log in to Azure
        if: matrix.clouds == 'azure' || matrix.clouds == 'all'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure ACR
        if: matrix.clouds == 'azure' || matrix.clouds == 'all'
        run: az acr login --name defang

      - name: Authenticate to Google Cloud
        if: matrix.clouds == 'gcp' || matrix.clouds == 'all'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Configure Docker for GCP Artifact Registry
        if: matrix.clouds == 'gcp' || matrix.clouds == 'all'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Compute image tags
        run: |
          TAG="${{ github.ref_name }}-${{ matrix.clouds }}"
          TAGS="${GHCR_REPO,,}:${TAG}"
          case "${{ matrix.clouds }}" in
            aws)   TAGS+=$'\n'"${AWS_REPO}:${TAG}" ;;
            azure) TAGS+=$'\n'"${AZURE_REPO}:${TAG}" ;;
            gcp)   TAGS+=$'\n'"${GCP_REPO}:${TAG}" ;;
            all)   TAGS+=$'\n'"${AWS_REPO}:${TAG}"
                   TAGS+=$'\n'"${AZURE_REPO}:${TAG}"
                   TAGS+=$'\n'"${GCP_REPO}:${TAG}" ;;
          esac
          # Use multiline env var syntax
          {
            echo "IMAGE_TAGS<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build and push CD images
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: . # include generated Go SDK
          platforms: linux/amd64 # amd64-only: CD images only ever run on amd64 in the cloud; local Apple dev uses Rosetta
          push: true
          target: ${{ matrix.clouds }}
          build-args: |
            CD_VERSION=${{ github.ref_name }}
            PROVIDER_VERSION=${{ github.ref_name }}
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha,scope=${{ github.workflow }}-amd64
          cache-to: type=gha,scope=${{ github.workflow }}-amd64,mode=max

      - name: Add digest to job summary
        run: |
          {
            echo "### ${{ matrix.clouds }}"
            echo '```'
            echo "$IMAGE_TAGS" | while read -r tag; do
              echo "${tag}@${{ steps.build-push.outputs.digest }}"
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Pin the CD image refs (digests) in the Defang Fabric so deployments use this exact build.
      - name: Set cd_image_ configs in Defang
        if: matrix.clouds == 'azure'
        uses: DefangLabs/defang-github-action@482e8e65caf00bc48ad2044d0e41cde178b3e2b6 # v2.3.0
        with:
          project: ecs
          stack: awsprod1oidc
          command: "config set -e cd_image_azure" # TODO: only Azure for now; AWS/GCP/DO are still handled by old TS code
        env:
          cd_image_aws: ${{ env.AWS_REPO }}@${{ steps.build-push.outputs.digest }}
          cd_image_azure: ${{ env.AZURE_REPO }}@${{ steps.build-push.outputs.digest }}
          cd_image_gcp: ${{ env.GCP_REPO }}@${{ steps.build-push.outputs.digest }}
