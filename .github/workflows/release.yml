name: release
on:
  push:
    tags:
      - '*.*.*'
      # - '!*.*.*-**'
permissions:
  contents: write # Allows writing releases
  packages: write # Allows publishing packages
  id-token: write # Required for requesting the JWT before publishing to Pypi and NPM

env:
  PROVIDER: "defang"
  # THIS GITHUB_TOKEN IS A REQUIREMENT TO BE ABLE TO WRITE TO GH RELEASES
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # IF YOU NEED TO PUBLISH A NPM PACKAGE THEN ENSURE PUBLISH_NPM: TRUE.
  # IF YOU WANT TO PUBLISH TO A PRIVATE NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  # Authentication is handled via npm Trusted Publishers (no token required).
  PUBLISH_NPM: true
  NPM_REGISTRY_URL: https://registry.npmjs.org
  # IF YOU NEED TO PUBLISH A NUGET PACKAGE THEN ENSURE AN NUGET_PUBLISH_KEY
  # SECRET IS SET AND PUBLISH_NUGET: TRUE. IF YOU WANT TO PUBLISH TO AN ALTERNATIVE
  # NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  NUGET_PUBLISH_KEY: ${{ secrets.NUGET_PUBLISH_KEY }}
  NUGET_FEED_URL: https://api.nuget.org/v3/index.json
  PUBLISH_NUGET: true
  # IF YOU NEED TO PUBLISH A PYPI PACKAGE THEN ENSURE PUBLISH_PYPI: TRUE.
  # Authentication is handled via PyPI Trusted Publishers (no token required).
  PUBLISH_PYPI: true
jobs:
  publish_binary:
    name: publish
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6
    - name: Unshallow clone for tags
      run: git fetch --prune --unshallow --tags
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.25.x
    - name: Install pulumictl
      run: |
        gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
        tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser # either 'goreleaser' (default) or 'goreleaser-pro'
        args: -p 3 release
        version: v2
  publish_sdk:
    name: Publish SDKs
    runs-on: ubuntu-latest
    needs: publish_binary
    environment: publish
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.goversion }}
      - name: Install pulumictl
        run: |
          gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
          tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
      - if: ${{ matrix.language == 'nodejs'}}
        name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.nodeversion}}
          registry-url: ${{ env.NPM_REGISTRY_URL }}
      - if: ${{ matrix.language == 'nodejs'}}
        name: Upgrade npm for Trusted Publishers support
        run: npm install -g npm@latest
      - if: ${{ matrix.language == 'dotnet'}}
        name: Setup DotNet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{matrix.dotnetversion}}
      - if: ${{ matrix.language == 'python'}}
        name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.pythonversion}}
      - name: Generate SDK
        run: make ${{ matrix.language }}_sdk_${{ matrix.provider }}
      - name: Compress SDK folder
        run: tar -zcf sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz -C sdk/${{ matrix.language }}/${{ matrix.provider }} .
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.language }}-${{ matrix.provider }}-sdk.tar.gz
          path: ${{ github.workspace}}/sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz
      - if: ${{ matrix.language == 'python' && env.PUBLISH_PYPI == 'true' }}
        name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{github.workspace}}/sdk/python/${{ matrix.provider }}/bin/dist
      - if: ${{ matrix.language == 'nodejs' && env.PUBLISH_NPM == 'true' }}
        name: Publish package to npm
        run: |
          DIST_TAG=$(node -e "const v=require('./package.json').version;const m=v.match(/-([a-zA-Z]+)/);process.stdout.write(m?m[1]:'latest')")
          npm publish --access public --tag "$DIST_TAG"
        working-directory: ${{github.workspace}}/sdk/nodejs/${{ matrix.provider }}/bin
      - if: ${{ matrix.language == 'dotnet' && env.PUBLISH_NUGET == 'true' }}
        name: publish nuget package
        run: |
          dotnet nuget push ${{github.workspace}}/sdk/dotnet/${{ matrix.provider }}/bin/Debug/*.nupkg -s ${{ env.NUGET_FEED_URL }} -k ${{ env.NUGET_PUBLISH_KEY }}
          echo "done publishing packages"
    strategy:
      fail-fast: false
      matrix:
        dotnetversion:
          - 6.0.x
        goversion:
          - 1.22.x
        language:
          - nodejs
          - python
          - dotnet
        nodeversion:
          - 22.x
        pythonversion:
          - "3.9"
        provider:
          - defang-aws
          - defang-gcp
          - defang-azure
