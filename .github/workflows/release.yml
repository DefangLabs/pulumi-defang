name: release
on:
  push:
    tags:
      - "v*.*.*"
      # - '!*.*.*-**'

permissions:
  contents: write # Allows writing releases
  packages: write # Allows publishing packages
  id-token: write # Required for requesting the JWT before publishing to Pypi and NPM
  pull-requests: write # Allows creating PRs for regenerated examples

env:
  PROVIDER: "defang"
  # THIS GITHUB_TOKEN IS A REQUIREMENT TO BE ABLE TO WRITE TO GH RELEASES
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # IF YOU NEED TO PUBLISH A NPM PACKAGE THEN ENSURE PUBLISH_NPM: TRUE.
  # IF YOU WANT TO PUBLISH TO A PRIVATE NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  # Authentication is handled via npm Trusted Publishers (no token required).
  PUBLISH_NPM: true
  NPM_REGISTRY_URL: https://registry.npmjs.org
  # IF YOU NEED TO PUBLISH A NUGET PACKAGE THEN ENSURE AN NUGET_PUBLISH_KEY
  # SECRET IS SET AND PUBLISH_NUGET: TRUE. IF YOU WANT TO PUBLISH TO AN ALTERNATIVE
  # NPM REGISTRY THEN ENSURE THE NPM_REGISTRY_URL IS CHANGED
  NUGET_PUBLISH_KEY: ${{ secrets.NUGET_PUBLISH_KEY }}
  NUGET_FEED_URL: https://api.nuget.org/v3/index.json
  PUBLISH_NUGET: true
  # IF YOU NEED TO PUBLISH A PYPI PACKAGE THEN ENSURE PUBLISH_PYPI: TRUE.
  # Authentication is handled via PyPI Trusted Publishers (no token required).
  PUBLISH_PYPI: true
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/cd

jobs:
  publish_binary:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser # either 'goreleaser' (default) or 'goreleaser-pro'
          args: -p 3 release
          version: v2

  publish_sdk:
    name: Publish SDKs
    runs-on: ubuntu-latest
    needs: publish_binary
    environment: publish
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup and build SDK
        uses: ./.github/actions/build-sdk
        with:
          language: ${{ matrix.language }}
          provider: defang-${{ matrix.provider }}

      - name: Compress SDK folder
        run: tar -zcf sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz -C sdk/${{ matrix.language }}/defang-${{ matrix.provider }} .
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.language }}-${{ matrix.provider }}-sdk.tar.gz
          path: ${{ github.workspace}}/sdk/${{ matrix.language }}-${{ matrix.provider }}.tar.gz
      - if: ${{ matrix.language == 'python' && env.PUBLISH_PYPI == 'true' }}
        name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{github.workspace}}/sdk/python/defang-${{ matrix.provider }}/bin/dist
      - if: ${{ matrix.language == 'nodejs' && env.PUBLISH_NPM == 'true' }}
        name: Publish package to npm
        run: |
          DIST_TAG=$(node -e "const v=require('./package.json').version;const m=v.match(/-([a-zA-Z]+)/);process.stdout.write(m?m[1]:'latest')")
          npm publish --access public --tag "$DIST_TAG"
        working-directory: ${{github.workspace}}/sdk/nodejs/defang-${{ matrix.provider }}/bin
      - if: ${{ matrix.language == 'dotnet' && env.PUBLISH_NUGET == 'true' }}
        name: publish nuget package
        run: |
          dotnet nuget push ${{github.workspace}}/sdk/dotnet/defang-${{ matrix.provider }}/bin/Debug/*.nupkg -s ${{ env.NUGET_FEED_URL }} -k ${{ env.NUGET_PUBLISH_KEY }}
          echo "done publishing packages"
    strategy:
      fail-fast: false
      matrix:
        language:
          - nodejs
          - python
          - dotnet
        provider:
          - aws
          - gcp
          - azure

  regenerate_examples:
    name: Regenerate Examples
    runs-on: ubuntu-latest
    needs: publish_binary
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - name: Regenerate examples
        run: make examples
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit and push updated examples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/
          if git diff --cached --quiet; then
            echo "No example changes to commit"
          else
            BRANCH="chore/regenerate-examples-${{ github.ref_name }}"
            git checkout -b "$BRANCH"
            git commit -m "chore: regenerate examples for ${{ github.ref_name }}"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: regenerate examples for ${{ github.ref_name }}" \
              --body "Automated regeneration of examples triggered by release ${{ github.ref_name }}." \
              --base main \
              --head "$BRANCH"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build_images_arm:
    name: Build Docker Images (ARM cache)
    runs-on: ubuntu-24.04-arm
    needs: publish_binary
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build ARM image (cache only)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: . # include generated Go SDK
          platforms: linux/arm64
          push: false
          target: all
          cache-from: type=gha,scope=${{ github.workflow }}-arm
          cache-to: type=gha,scope=${{ github.workflow }}-arm,mode=max

  publish_images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: build_images_arm
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        clouds: [aws, gcp, azure, all]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: matrix.clouds == 'aws' || matrix.clouds == 'all'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # ECR Public is always us-east-1

      - name: Log in to Amazon ECR Public
        if: matrix.clouds == 'aws' || matrix.clouds == 'all'
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        with:
          registry-type: public

      - name: Log in to Azure
        if: matrix.clouds == 'azure' || matrix.clouds == 'all'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure ACR
        if: matrix.clouds == 'azure' || matrix.clouds == 'all'
        run: az acr login --name defang

      - name: Authenticate to Google Cloud
        if: matrix.clouds == 'gcp' || matrix.clouds == 'all'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Configure Docker for GCP Artifact Registry
        if: matrix.clouds == 'gcp' || matrix.clouds == 'all'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Lowercase image repo
        run: echo "IMAGE_REPO=${IMAGE_REPO,,}" >> "$GITHUB_ENV"

      - name: Compute image tags
        run: |
          TAG="${{ github.ref_name }}-${{ matrix.clouds }}"
          TAGS="${IMAGE_REPO,,}:${TAG}"
          case "${{ matrix.clouds }}" in
            aws)   TAGS+=$'\n'"public.ecr.aws/defang-io/cd:${TAG}" ;;
            azure) TAGS+=$'\n'"defang.azurecr.io/cd:${TAG}" ;;
            gcp)   TAGS+=$'\n'"us-central1-docker.pkg.dev/defang-io/public/cd:${TAG}" ;;
            all)   TAGS+=$'\n'"public.ecr.aws/defang-io/cd:${TAG}"
                   TAGS+=$'\n'"defang.azurecr.io/cd:${TAG}"
                   TAGS+=$'\n'"us-central1-docker.pkg.dev/defang-io/public/cd:${TAG}" ;;
          esac
          # Use multiline env var syntax
          {
            echo "IMAGE_TAGS<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build and push multi-arch images
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: . # include generated Go SDK
          platforms: linux/amd64,linux/arm64
          push: true
          target: ${{ matrix.clouds }}
          build-args: |
            CD_VERSION=${{ github.ref_name }}
            PROVIDER_VERSION=${{ github.ref_name }}
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha,scope=${{ github.workflow }}-arm
          cache-to: type=gha,scope=${{ github.workflow }}-arm,mode=max

      - name: Add digest to job summary
        run: |
          {
            echo "### ${{ matrix.clouds }}"
            echo '```'
            echo "$IMAGE_TAGS" | while read -r tag; do
              echo "${tag}@${{ steps.build-push.outputs.digest }}"
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
