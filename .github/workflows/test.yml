name: test
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "provider/**"
      - "sdk/v2/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile"
      - ".github/actions/build-sdk/**"
      - ".github/actions/setup-go/**"
      - ".github/workflows/test.yml"

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/cd

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Check README examples are in sync
        run: scripts/check-readme-examples.sh

      - run: make provider

      - run: make schema && git diff --exit-code -- provider/cmd/pulumi-resource-defang/schema.json

      - run: make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.7.2
          args: --timeout=5m --config=.golangci.yaml ./provider/...

  build_sdks:
    name: Build SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(github.event_name == 'pull_request' && '["go"]' || '["nodejs","python","dotnet","go"]') }}
        provider:
          - aws
          - gcp
          - azure

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup and build SDK
        uses: ./.github/actions/build-sdk
        with:
          language: ${{ matrix.language }}
          provider: defang-${{ matrix.provider }}

      - name: Check Go SDK is up to date
        if: matrix.language == 'go'
        run: |
          git update-index -q --refresh
          if ! git diff-index --quiet HEAD -- sdk/v2/; then
            >&2 echo "error: Go SDK is out of date. Run 'make go_sdk' and commit the result."
            git diff --stat sdk/v2/
            exit 1
          fi

      - name: Build Example
        run: make example_${{ matrix.provider }}_${{ matrix.language }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

    # - name: Check clean examples working tree
    #   run: |
    #     git update-index -q --refresh
    #     if ! git diff-index --quiet HEAD -- examples/; then
    #         >&2 echo "error: examples directory is not clean, aborting!"
    #         git status examples/
    #         git diff examples/
    #         exit 1
    #     fi

    # - name: Ensure clean example versions
    #   run: |
    #     if grep -r '+dirty' examples/; then
    #       >&2 echo "error: found +dirty version in examples. Regenerate examples with \`make examples\` and commit the changes."
    #       exit 1
    #     fi

  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - build_sdks
    environment: defang-staging
    permissions:
      contents: read
      packages: write
      id-token: write # for defang OIDC login
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image repo and tag
        run: |
          echo "IMAGE_REPO=${IMAGE_REPO,,}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=$(make version)" >> "$GITHUB_ENV"
          fi

      - name: Build and push image to GHCR
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: . # build context must be repo root to include generated Go SDK
          push: true
          target: all
          tags: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,scope=${{ github.workflow }},mode=max

      # Pin the staging Azure CD image ref (digest) in the Defang Fabric. Only on main-branch
      # pushes — PR runs would otherwise have every contributor overwrite the staging config.
      - name: Set cd_image_ configs in Defang
        # if: github.event_name == 'push'
        uses: DefangLabs/defang-github-action@482e8e65caf00bc48ad2044d0e41cde178b3e2b6 # v2.3.0
        with:
          project: ecs
          stack: awsstagingoidc
          command: config set -e cd_image_azure # cd_image_cb cd_image_gcp"
        env:
          cd_image_azure: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
          # cd_image_cb: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
          # cd_image_gcp: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
