name: test
on:
  push:
    branches:
      - "**"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Install pulumictl
      run: |
        gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
        tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Unshallow clone for tags
      run: git fetch --prune --unshallow --tags
    - run: make provider
    - run: make schema && git diff --exit-code -- provider/cmd/pulumi-resource-defang/schema.json
    - run: make test
