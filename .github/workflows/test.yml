name: test
on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - docs
      - .devcontainer
      - examples

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/cd

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum

    - name: Install pulumictl
      run: |
        gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
        tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Unshallow clone for tags
      run: git fetch --prune --unshallow --tags

    - run: make provider

    - run: make schema && git diff --exit-code -- provider/cmd/pulumi-resource-defang/schema.json

    - run: make test

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.7.2
        args: --timeout=5m --config=.golangci.yaml ./provider/...

  setup_sdk_matrix:
    name: Set SDK Matrix
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.matrix.outputs.languages }}
    steps:
    - id: matrix
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo 'languages=["go"]' >> $GITHUB_OUTPUT
        else
          echo 'languages=["nodejs","python","dotnet","go"]' >> $GITHUB_OUTPUT
        fi

  build_sdks:
    name: Build SDKs
    needs: setup_sdk_matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.setup_sdk_matrix.outputs.languages) }}
        provider:
        - aws
        - gcp
        - azure

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Setup and build SDK
      uses: ./.github/actions/build-sdk
      with:
        language: ${{ matrix.language }}
        provider: defang-${{ matrix.provider }}

    - name: Check clean sdks working tree
      run: |
        git update-index -q --refresh
        if ! git diff-index --quiet HEAD -- sdks/; then
          >&2 echo "error: sdks directory is not clean, aborting!"
          git status sdks/
          git diff sdks/
          exit 1
        fi

    - name: Build Example
      run: make example_${{ matrix.provider }}_${{ matrix.language }}
      env:
        GITHUB_TOKEN: ${{ github.token }}

    # - name: Check clean examples working tree
    #   run: |
    #     git update-index -q --refresh
    #     if ! git diff-index --quiet HEAD -- examples/; then
    #         >&2 echo "error: examples directory is not clean, aborting!"
    #         git status examples/
    #         git diff examples/
    #         exit 1
    #     fi

    # - name: Ensure clean example versions
    #   run: |
    #     if grep -r '+dirty' examples/; then
    #       >&2 echo "error: found +dirty version in examples. Regenerate examples with \`make examples\` and commit the changes."
    #       exit 1
    #     fi

  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # needs: test # temporarily disabled for faster iteration
    permissions:
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # pulumictl needs full history to compute version

      - name: Fetch all tags
        run: git fetch origin 'refs/tags/*:refs/tags/*' # fetch tags from all branches, not just current

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install pulumictl
        run: |
          gh release download --repo pulumi/pulumictl --pattern 'pulumictl-*-linux-amd64.tar.gz' --dir /tmp
          tar -xzf /tmp/pulumictl-*-linux-amd64.tar.gz -C /usr/local/bin pulumictl
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Go SDK
        run: make go_sdk VERSION=2.0.0-dev # override version; pulumictl resolves to v1.x on feature branches

      - name: Verify SDK exists
        run: |
          echo "=== git tags ==="
          git tag | tail -5
          echo "=== find sdk ==="
          find sdk -type d 2>/dev/null || echo "sdk/ does not exist"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repo
        run: echo "IMAGE_REPO=${IMAGE_REPO,,}" >> $GITHUB_ENV

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: . # build context must be repo root to include generated Go SDK
          push: true
          build-args: CLOUDS=all
          tags: ${{ env.IMAGE_REPO }}:pr-${{ github.sha }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,scope=${{ github.workflow }},mode=max
