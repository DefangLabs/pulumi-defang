name: test
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "cd/**"
      - "provider/**"
      - "sdk/v2/**"
      - "tests/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile"
      - ".github/actions/build-sdk/**"
      - ".github/actions/setup-go/**"
      - ".github/workflows/test.yml"

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/cd

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Check README examples are in sync
        run: scripts/check-readme-examples.sh

      - run: make provider

      - run: make schema

      - run: COVER=1 make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.7.2
          args: --timeout=5m --config=.golangci.yaml ./provider/...

  build_sdks:
    name: Build SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(github.event_name == 'pull_request' && '["go"]' || '["nodejs","python","dotnet","go"]') }}
        provider:
          - aws
          - gcp
          - azure
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup and build SDK
        uses: ./.github/actions/build-sdk
        with:
          language: ${{ matrix.language }}
          provider: defang-${{ matrix.provider }}

      - name: Build Example
        run: make example_${{ matrix.provider }}_${{ matrix.language }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

    # - name: Check clean examples working tree
    #   run: |
    #     git update-index -q --refresh
    #     if ! git diff-index --quiet HEAD -- examples/; then
    #         >&2 echo "error: examples directory is not clean, aborting!"
    #         git status examples/
    #         git diff examples/
    #         exit 1
    #     fi

    # - name: Ensure clean example versions
    #   run: |
    #     if grep -r '+dirty' examples/; then
    #       >&2 echo "error: found +dirty version in examples. Regenerate examples with \`make examples\` and commit the changes."
    #       exit 1
    #     fi

  regen:
    # Keep committed schema and Go SDK in sync with source. Schemas are
    # deterministic (version-less, see defang-*.mk), so any diff is a real
    # source change that needs regenerating.
    #   Same-repo PRs: auto-commit the regen back to the branch. The original
    #     run already validated the source; the auto-commit only touches
    #     derivable artifacts, so it doesn't need to re-trigger CI (and won't,
    #     since pushes via GITHUB_TOKEN don't fire workflows by design).
    #   Fork PRs and direct pushes (e.g. admin to main): fail with a clear diff.
    name: Regenerate schema and Go SDK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch or pushed ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Install Pulumi CLI
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6

      - run: make provider schema go_sdk

      - name: Commit and push (same-repo PR) or fail on drift
        run: |
          git add provider/cmd/pulumi-resource-defang-*/schema.json sdk/v2/
          if git diff --cached --quiet; then
            echo "No regenerated changes."
            exit 0
          fi
          # Auto-commit only on same-repo PRs; fork PRs and push events fail.
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: regenerate schema and Go SDK"
            git push
          else
            >&2 echo "error: schema or Go SDK is out of date. Run 'make schema go_sdk' locally and commit the result."
            git diff --cached --stat
            exit 1
          fi

  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - build_sdks
    environment: defang-staging
    permissions:
      contents: read
      packages: write
      id-token: write # for defang OIDC login
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image repo and tag
        run: |
          echo "IMAGE_REPO=${IMAGE_REPO,,}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=$(make version)" >> "$GITHUB_ENV"
          fi

      - name: Build and push image to GHCR
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: . # build context must be repo root to include generated Go SDK
          push: true
          target: all
          tags: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,scope=${{ github.workflow }},mode=max

      # Pin the staging Azure CD image ref (digest) in the Defang Fabric. Only on main-branch
      # pushes — PR runs would otherwise have every contributor overwrite the staging config.
      - name: Set cd_image_ configs in Defang
        if: github.event_name == 'push'
        uses: DefangLabs/defang-github-action@482e8e65caf00bc48ad2044d0e41cde178b3e2b6 # v2.3.0
        with:
          project: ecs
          stack: awsstagingoidc
          command: config set -e cd_image_azure # cd_image_cb cd_image_gcp"
        env:
          cd_image_azure: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
          # cd_image_cb: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
          # cd_image_gcp: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
