version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # Only major version bumps; security advisories always bypass ignore rules.
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # Explicit gomod directories override GitHub's auto-discovery, which would
  # otherwise open PRs against generated code under /sdk and /examples.
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/cd"
    schedule:
      interval: "weekly"
    groups:
      # azure-native is the only Pulumi SDK we use that ships as many
      # independently-versioned subpackages (app/v3, network/v3,
      # operationalinsights/v3, ...). Bumping them separately drifts versions
      # apart, which mismatches the plugin version baked into
      # PkgResourceDefaultOpts and breaks resource dispatch ("Resource type
      # azure-native:<svc>:<Resource> not found"). Grouping forces one PR for
      # the whole family.
      pulumi-azure-native-sdk:
        patterns:
          - "github.com/pulumi/pulumi-azure-native-sdk*"
