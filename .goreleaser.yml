version: 2

# One archive per provider build: pulumi's github:// plugin source resolves
# release assets by name (pulumi-resource-defang-<cloud>-<tag>-<os>-<arch>),
# so each plugin needs its own correctly-named archive. A single archive spec
# bundles ALL builds' binaries under the first build's name, which left the
# gcp/azure plugins uninstallable (registry PR 11614).
archives:
  - id: defang-aws
    ids: [pulumi-resource-defang-aws]
    name_template: '{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]
  - id: defang-gcp
    ids: [pulumi-resource-defang-gcp]
    name_template: '{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]
  - id: defang-azure
    ids: [pulumi-resource-defang-azure]
    name_template: '{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]

before:
  hooks: []

builds:
  - id: pulumi-resource-defang-aws
    binary: pulumi-resource-defang-aws
    dir: provider
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - windows
      - linux
    ldflags:
      - -s
      - -w
      - -X github.com/DefangLabs/pulumi-defang/provider/defangaws.Version={{.Tag}}
    main: ./cmd/pulumi-resource-defang-aws/
  - id: pulumi-resource-defang-gcp
    binary: pulumi-resource-defang-gcp
    dir: provider
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - windows
      - linux
    ldflags:
      - -s
      - -w
      - -X github.com/DefangLabs/pulumi-defang/provider/defanggcp.Version={{.Tag}}
    main: ./cmd/pulumi-resource-defang-gcp/
  - id: pulumi-resource-defang-azure
    binary: pulumi-resource-defang-azure
    dir: provider
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - windows
      - linux
    ldflags:
      - -s
      - -w
      - -X github.com/DefangLabs/pulumi-defang/provider/defangazure.Version={{.Tag}}
    main: ./cmd/pulumi-resource-defang-azure/

changelog:
  disable: true

release:
  prerelease: auto
  # Attach per-provider schemas as release assets so the Pulumi Registry's
  # nightly job has a stable URL alongside the source-tree path (issue #215).
  # Schemas are deterministic (version-less; see defang-*.mk schema target).
  extra_files:
    - glob: provider/cmd/pulumi-resource-defang-aws/schema.json
      name_template: schema-defang-aws.json
    - glob: provider/cmd/pulumi-resource-defang-gcp/schema.json
      name_template: schema-defang-gcp.json
    - glob: provider/cmd/pulumi-resource-defang-azure/schema.json
      name_template: schema-defang-azure.json

snapshot:
  version_template: '{{ .Tag }}-SNAPSHOT'